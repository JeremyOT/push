<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f9f9f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Push</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/apple-touch-icon-precomposed.png">
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon-precomposed.png">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <img src="icon.svg" alt="Push Icon" class="header-icon">
            <h1>Push</h1>
            <button id="subscribe-btn" style="margin-left: auto; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; display: none;">Notify Me</button>
        </div>
        <div id="messages" class="messages">
            <!-- Messages will be inserted here -->
        </div>
        <!-- Since it's one-way, maybe no input? "Post new interactions by sending JSON POST requests... View messages by visiting..." -->
        <!-- The README implies the web view is for VIEWING. Sending is done via curl/API. 
             "Post new interactions by sending JSON POST requests... View messages by visiting..." 
             But "one way chat" usually implies one person talking. -->
    </div>
    <script src="app.js"></script>
</body>
</html>

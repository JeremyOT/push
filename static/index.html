<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Push</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0b0d10; height: 100%; width: 100%; overflow: hidden; position: fixed; }
  body { font-family: "Inter", -apple-system, system-ui, sans-serif; color: #e7eaee; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; width: 100%; }
  * { box-sizing: border-box; }
  @keyframes pushDot {
    0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-2px); }
  }
  @keyframes pushPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  @keyframes pushToast {
    0% { opacity: 0; transform: translate(-50%, 20px); }
    100% { opacity: 1; transform: translate(-50%, 0); }
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.45); }
  
  /* Markdown styling */
  .markdown-body { line-height: 1.5; font-size: 14px; }
  .markdown-body p, .markdown-body ul, .markdown-body ol, .markdown-body pre, .markdown-body blockquote { margin-bottom: 12px; }
  .markdown-body p:last-child { margin-bottom: 0; }
  .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { margin: 16px 0 8px; font-weight: 600; line-height: 1.25; }
  .markdown-body h1 { font-size: 1.5em; }
  .markdown-body h2 { font-size: 1.3em; }
  .markdown-body h3 { font-size: 1.1em; }
  .markdown-body code { font-family: "JetBrains Mono", monospace; font-size: 0.9em; padding: 0.2em 0.4em; border-radius: 4px; background: rgba(128,128,128,0.15); }
  .markdown-body pre { padding: 12px; overflow: auto; border-radius: 8px; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); }
  .markdown-body pre code { padding: 0; background: transparent; font-size: 13px; }
  .markdown-body ul, .markdown-body ol { padding-left: 1.5em; }
  .markdown-body blockquote { padding-left: 1em; border-left: 3px solid rgba(128,128,128,0.35); color: #9aa3ad; }
  .markdown-body img { max-width: 100%; height: auto; border-radius: 4px; }
  .markdown-body table { border-collapse: collapse; width: 100%; margin-bottom: 12px; }
  .markdown-body th, .markdown-body td { border: 1px solid rgba(128,128,128,0.3); padding: 6px 12px; text-align: left; }
  .markdown-body th { background: rgba(128,128,128,0.1); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div id="root"></div>

<script id="config" type="application/json">{"interactive": false}</script>

<script type="text/babel" src="chat-icons.jsx"></script>
<script type="text/babel" src="chat-theme.jsx"></script>
<script type="text/babel" src="chat-brand.jsx"></script>
<script type="text/babel" src="chat-data.jsx"></script>
<script type="text/babel" src="chat-sidebar.jsx"></script>
<script type="text/babel" src="chat-rail.jsx"></script>
<script type="text/babel" src="chat-messages.jsx"></script>
<script type="text/babel" src="chat-composer.jsx"></script>
<script type="text/babel" src="chat-app.jsx"></script>

<script type="text/babel" data-presets="env,react">
const config = JSON.parse(document.getElementById('config').textContent);

function App() {
  const [dark, setDark] = React.useState(true);
  const [mode, setMode] = React.useState(window.innerWidth < 768 ? 'phone' : 'tablet');
  const theme = THEMES[dark ? 'dark' : 'light'];
  
  React.useEffect(() => {
    const handleResize = () => {
      setMode(window.innerWidth < 768 ? 'phone' : 'tablet');
    };
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  const icon = React.useMemo(() => ({
    ...APP_ICON, src: 'icon.svg', bg: '#000000',
  }), []);

  return (
    <PushChat 
      theme={theme} 
      dark={dark} 
      setDark={setDark} 
      mode={mode} 
      icon={icon}
      config={config}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

// Register Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(() => {
        console.log('Service Worker registered');
        registerPush();
    });
}

async function registerPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        console.warn('Push messaging is not supported');
        return false;
    }

    try {
        const registration = await navigator.serviceWorker.ready;
        
        // Fetch VAPID public key
        const response = await fetch('/vapid-public-key');
        const { publicKey } = await response.json();
        
        const subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: publicKey
        });
        
        const subResponse = await fetch('/subscribe', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(subscription)
        });
        
        if (subResponse.ok) {
            console.log('Push subscription successful');
            return true;
        } else {
            console.error('Push subscription failed');
            return false;
        }
    } catch (error) {
        console.error('Error during push registration:', error);
        return false;
    }
}

window.registerPush = registerPush;
</script>
</body>
</html>

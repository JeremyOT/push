<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f9f9f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Push</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <img src="icon.svg" alt="Push Icon" class="header-icon">
            <h1>Push</h1>
            <button id="subscribe-btn" style="margin-left: auto; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; display: none;">Notify Me</button>
        </div>
        <div id="messages" class="messages">
            <!-- Messages will be inserted here -->
        </div>
        <div id="chat-input" class="chat-input">
            <textarea id="message-text" placeholder="Send a message..." rows="1"></textarea>
            <button id="send-btn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
    <script id="config" type="application/json">{"interactive": false}</script>
    <script src="app.js"></script>
</body>
</html>
